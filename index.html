<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wind & Motion Playground</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="ui">
    <div class="panel">
      <h1>Wind & Motion Playground</h1>

      <div class="row">
        <label for="themeSelect">Theme</label>
        <select id="themeSelect">
          <option value="leaves">Leaves</option>
          <option value="confetti">Confetti</option>
          <option value="fireflies">Fireflies</option>
          <option value="dust">Baseball Dust</option>
        </select>
      </div>

      <div class="row">
        <label for="particleCount">Particles</label>
        <input type="range" id="particleCount" min="100" max="1200" value="450" step="50" />
        <span id="particleCountValue">450</span>
      </div>

      <div class="row">
        <label for="windStrength">Wind Strength</label>
        <input type="range" id="windStrength" min="0.2" max="4" value="1.5" step="0.1" />
        <span id="windStrengthValue">1.5</span>
      </div>

      <div class="row">
        <label for="trailToggle">Trails</label>
        <input type="checkbox" id="trailToggle" checked />
      </div>

      <div class="row">
        <label for="autoDriftToggle">Auto Drift</label>
        <input type="checkbox" id="autoDriftToggle" checked />
      </div>

      <div class="row">
        <button id="burstBtn">Burst Pulse</button>
        <button id="resetBtn">Reset</button>
      </div>

      <div class="instructions">
        <p><strong>Controls:</strong></p>
        <p>Move mouse = wind</p>
        <p>Click = pulse burst</p>
        <p>Theme menu = different moods</p>
      </div>
    </div>
  </div>

  <canvas id="playground"></canvas>

  <script src="app.js"></script>
</body>
</html>
